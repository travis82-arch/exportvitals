<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About | ExportVitals</title>
  <meta name="description" content="About the ExportVitals project and local wearable export ZIP support."/>
  <meta property="og:title" content="About | ExportVitals" />
  <meta property="og:description" content="Independent, open-source local dashboard with Oura export ZIP support." />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/app-icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/app-icon-16.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="canonical" href="https://oura-pwa-dashboard.pages.dev/about"/>
  <link rel="stylesheet" href="/src/marketing.css"/>
</head>
<body>
  <main class="marketing-wrap">
    <section class="section">
      <h1>About</h1>
      <div class="grid">
        <article class="card">
          <h2>What this is</h2>
          <p>ExportVitals is an unofficial browser dashboard for wearable export files.</p>
        </article>
        <article class="card">
          <h2>Privacy / local processing</h2>
          <blockquote class="highlight" id="trustStatement"></blockquote>
        </article>
        <article class="card">
          <h2>Compatibility</h2>
          <p>Supports Oura export ZIPs.</p>
          <p>Fitbit support planned.</p>
        </article>
        <article class="card">
          <h2>Open source / public repo</h2>
          <p id="repoStatus">Public repo coming soon.</p>
        </article>
        <article class="card">
          <h2>Affiliation</h2>
          <p>Unofficial.</p>
          <p>Not affiliated with Oura.</p>
        </article>
      </div>
    </section>
  </main>
  <script type="module">
    import { SITE_COPY, PUBLIC_REPO_FALLBACK_TEXT, getPublicRepoUrl } from '/src/config/siteCopy.js';

    const trust = document.getElementById('trustStatement');
    if (trust) trust.textContent = SITE_COPY.trustStatement;

    const repoStatus = document.getElementById('repoStatus');
    const repoUrl = getPublicRepoUrl();
    if (repoStatus) {
      repoStatus.innerHTML = repoUrl
        ? `<a class="text-link" href="${repoUrl}" target="_blank" rel="noreferrer">Public repository</a>`
        : PUBLIC_REPO_FALLBACK_TEXT;
    }
  </script>
</body>
</html>
